<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>페이지를 찾을 수 없습니다 | 글로닉스 이민법인</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  :root { --c:#43809E; --ink:#0E0F11; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; text-align:center;
    font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:linear-gradient(160deg,#0E0F11,#18191C 60%,#24272B); color:#EEF1F3; padding:24px; }
  .code { font-size:clamp(64px,16vw,140px); font-weight:800; color:var(--c); line-height:1; letter-spacing:-.02em; }
  h1 { font-size:clamp(1.2rem,3vw,1.6rem); margin:8px 0 12px; }
  p { color:#9BA6AD; max-width:40ch; margin:0 auto 28px; }
  a.btn { display:inline-block; background:var(--c); color:#fff; text-decoration:none; font-weight:600;
    padding:14px 28px; border-radius:6px; transition:transform .18s, background .2s; }
  a.btn:hover { background:#2F6580; transform:translateY(-2px); }
</style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 이동되었거나 존재하지 않습니다. 홈으로 돌아가 다시 찾아 주세요.</p>
    <a class="btn" href="/">홈으로 돌아가기</a>
  </main>
</body>
</html>
